name: Sync data from fillbench.com

# Keeps this public mirror fresh by pulling the already-public benchmark data from
# the live site once a day. Uses only the built-in GITHUB_TOKEN (no secrets) and only
# public URLs, so it never touches the private collection pipeline.

on:
  schedule:
    - cron: '17 6 * * *'   # daily, ~06:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch published data from fillbench.com
        run: |
          set -euo pipefail
          # Each dataset maps to a public endpoint pair (<name>-history.json / <name>-latest.json)
          # and a local folder data/<name>/. Add a line here to mirror another benchmark.
          for name in latency fees fees-sol; do
            mkdir -p "data/${name}"
            curl -fsSL "https://fillbench.com/data/${name}-history.json" -o "data/${name}/history.json"
            curl -fsSL "https://fillbench.com/data/${name}-latest.json"  -o /tmp/latest.json
            # Name the latest run by its UTC date so daily snapshots accumulate here too.
            date="$(python3 -c "import json; print(json.load(open('/tmp/latest.json'))['timestamp_utc'][:10])")"
            cp /tmp/latest.json "data/${name}/${date}.json"
          done

      - name: Regenerate flattened CSV table(s)
        run: |
          set -euo pipefail
          # Tabular mirror of history.json for dataset-platform viewers (Kaggle preview,
          # Hugging Face dataset viewer + Parquet indexing). Rerun so the CSV never lags.
          python3 scripts/history_to_csv.py

      - name: Commit if changed
        run: |
          git config user.name "FillBench Sync"
          git config user.email "hello@fillbench.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "chore: sync benchmark data from fillbench.com (latency + fees + fees-sol)"
            git push
          fi
